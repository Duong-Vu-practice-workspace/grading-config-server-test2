server:
  port: 8086

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/Duong-Vu-practice-workspace/grading-config-test2.git}
          default-label: main
          search-paths: '{application}'
          clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
